<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<title>Academia dos Criadores de Sonhos</title>

<style>

body{

margin:0;
font-family:Segoe UI;
overflow:hidden;
color:white;

}

/* MAPA */

.mapa{

background-image:url("img/mapa.png");
background-size:cover;
background-position:center;

width:100vw;
height:100vh;

position:relative;

}

/* PERSONAGENS */

.personagem{

position:absolute;
bottom:20px;
width:200px;

animation:entrar 2s ease;

}

#anny{

left:40px;

}

#thomas{

right:40px;

}

@keyframes entrar{

from{

opacity:0;
transform:translateY(100px);

}

to{

opacity:1;
transform:translateY(0);

}

}

/* BALÃO */

.balao{

position:absolute;
bottom:220px;
background:rgba(0,0,0,0.6);
padding:15px;
border-radius:15px;
width:200px;
font-size:15px;

}

#fala1{left:40px;}
#fala2{right:40px;}

/* PORTAIS */

.portal{

position:absolute;

background:rgba(0,0,0,0.6);
border-radius:20px;

padding:15px 25px;

cursor:pointer;

transition:0.3s;

box-shadow:0 0 15px rgba(255,255,255,0.3);

}

.portal:hover{

transform:scale(1.1);

box-shadow:0 0 25px #00eaff;

}

/* POSIÇÕES NO MAPA */

#missao{top:20%;left:45%;}
#lab{top:40%;left:25%;}
#biblioteca{top:40%;right:25%;}
#robo{bottom:35%;left:50%;}
#diario{bottom:20%;left:25%;}
#ideias{bottom:20%;right:25%;}

.titulo{

position:absolute;
top:30px;
left:50%;
transform:translateX(-50%);
font-size:36px;
text-shadow:0 0 10px black;

}

</style>

</head>

<body>

<audio autoplay loop>

<source src="audio/musica.mp3" type="audio/mpeg">

</audio>

<div class="mapa">

<div class="titulo">

🌌 Academia dos Criadores de Sonhos

</div>

<!-- PERSONAGENS -->

<img src="img/anny.png" class="personagem" id="anny">

<div class="balao" id="fala1">

Olá! Eu sou Anny, criadora de sonhos.

</div>

<img src="img/thomas.png" class="personagem" id="thomas">

<div class="balao" id="fala2">

Eu sou Thomas. Escolha um portal para começar!

</div>

<!-- PORTAIS -->

<div class="portal" id="missao">

⚔️ Torre das Missões

</div>

<div class="portal" id="lab">

🧪 Laboratório

</div>

<div class="portal" id="biblioteca">

📚 Biblioteca

</div>

<div class="portal" id="robo">

🤖 Arena do Robô

</div>

<div class="portal" id="diario">

📖 Diário

</div>

<div class="portal" id="ideias">

💡 Sala de Ideias

</div>

</div>

</body>

</html>
