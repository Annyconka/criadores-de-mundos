<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<title>Academia dos Criadores de Sonhos</title>

<style>

body{

margin:0;
font-family:Georgia;
overflow:hidden;
color:white;

}

/* MAPA */

.mapa{

background-image:url("img/mapa.png");
background-size:cover;
background-position:center;

width:100vw;
height:100vh;

position:relative;

}

/* TITULO */

.titulo{

position:absolute;
top:30px;
left:50%;
transform:translateX(-50%);
font-size:40px;
text-shadow:0 0 15px black;

}

/* PERSONAGEM */

.personagem{

position:absolute;
bottom:0;
left:60px;

width:260px;

animation:entrar 2s ease;

}

@keyframes entrar{

from{

opacity:0;
transform:translateY(120px);

}

to{

opacity:1;
transform:translateY(0);

}

}

/* CADERNO */

.caderno{

position:absolute;
bottom:80px;
left:220px;
width:150px;

}

/* BALÃO */

.balao{

position:absolute;
bottom:280px;
left:200px;

background:url("img/pergaminho.png");
background-size:cover;

padding:30px;
width:260px;

color:#3b2c15;

font-weight:bold;

}

/* PORTAIS */

.portal{

position:absolute;
width:140px;
cursor:pointer;

transition:0.4s;

}

.portal:hover{

transform:scale(1.2);
filter:drop-shadow(0 0 10px cyan);

}

/* POSIÇÃO DOS PORTAIS */

#p1{top:22%;left:48%;}
#p2{top:40%;left:24%;}
#p3{top:40%;right:24%;}
#p4{bottom:34%;left:50%;}
#p5{bottom:20%;left:25%;}
#p6{bottom:20%;right:25%;}

</style>

<script>

function abrirMissao(){

alert("Missão 01 iniciada!")

}

function abrirDiario(){

alert("Abrindo Diário do Criador")

}

function abrirBiblioteca(){

alert("Biblioteca aberta")

}

function abrirLaboratorio(){

alert("Laboratório iniciado")

}

function abrirRobo(){

alert("Arena do robô")

}

function abrirIdeias(){

alert("Sala de ideias")

}

</script>

</head>

<body>

<audio autoplay loop>

<source src="audio/fantasia.mp3">

</audio>

<div class="mapa">

<div class="titulo">

🌌 Academia dos Criadores de Sonhos

</div>

<!-- PERSONAGEM -->

<img src="img/anny.png" class="personagem">

<img src="img/caderno.png" class="caderno">

<div class="balao">

Bem-vindo, Criador.  
Este é o **Caderno do Criador**.  

Cada portal no mapa leva a um desafio.  

Escolha um e comece sua jornada.

</div>

<!-- PORTAIS -->

<img src="img/portal.png" id="p1" class="portal" onclick="abrirMissao()">

<img src="img/portal.png" id="p2" class="portal" onclick="abrirLaboratorio()">

<img src="img/portal.png" id="p3" class="portal" onclick="abrirBiblioteca()">

<img src="img/portal.png" id="p4" class="portal" onclick="abrirRobo()">

<img src="img/portal.png" id="p5" class="portal" onclick="abrirDiario()">

<img src="img/portal.png" id="p6" class="portal" onclick="abrirIdeias()">

</div>

</body>

</html>
